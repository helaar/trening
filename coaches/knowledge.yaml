common_knowledge:
  - rule: "Commuting activities"
    accept: | 
      - Only mention if they affect the training plan or intensity distribution. 
      - 30 minutes commute in HR zone 1-2 rarely affect the training load
    reject: |
      - Do not bring up if it is merely a recognized pattern and has no training relevance. 
      - Appreciate presence of sensordata on commutes, but do not report them missing.

  - rule: "Start/end anomalies"
    accept: "Only include if start/end irregularities last more than 5 minutes or affect the main part of the session."
    reject: "Ignore minor sensor spikes/dropouts at start or end; these are common and without significance."

  - rule: "Virtual ERG rides"
    context: |
      ERG mode is a virtual trainer feature that automatically controls resistance to maintain a target power output. 
      When ERG is active, stable power is expected and does not reflect athlete effort or pacing discipline—it is a machine function.
      The athlete's task in ERG is simply to maintain cadence; the trainer adjusts resistance automatically.
    accept: |
      - Confirm ERG mode was detected if erg_probability is high, as brief context only.
      - Only flag as noteworthy if the goal was to train WITHOUT ERG and data suggests unintentional ERG activation.
      - It is usual to have ERG active during structured intervals. If readings show ERG mode for some intervals, 
        assume it was active for the entire workout.
      - ERG is hard to detect in warmup/cooldown or very short intervals which is the reason they may be marked as
        non ERG intervals.
    reject: |
      - Do not praise stable power, pacing discipline, or consistency when ERG mode is active—it is automatic, not athlete-driven.
      - Do not describe ERG-controlled stability as a performance achievement.
      - Do not report stable power metrics as findings unless they reveal something beyond ERG's expected behavior.

  - rule: "Strength training data from Strava"
    accept: "Only confirm that a strength session was completed."
    reject: "No detailed analysis or quality assessment; data is not available."

  - rule: "Cadence & power modality"
    accept: "Compare only within the correct modality: Running = SPM, Cycling = RPM. Running power should only be considered relative to running norms."
    reject: "Do not compare running power directly to cycling power, and do not confuse SPM with RPM."

  - rule: "HRV and sleep data"
    context: |
      Sleep duration naturally varies between weekdays and weekends for most athletes. 
      Weekday sleep is often 1–2 hours shorter due to work/life schedules, and this is normal.
      Evaluate sleep in the context of:
      - The athlete's typical weekday vs. weekend pattern
      - Sleep quality (deep sleep, restlessness) in addition to duration
      - Actual performance and readiness indicators (session execution, RPE, HR response)
      Do not flag normal weekday sleep reduction unless it is combined with clear performance decline or fatigue symptoms.
    
    accept: |
      Mention sleep or HRV only if there is a very clear, sustained deviation from the athlete's context-appropriate baseline:
      - ≥10% HRV change lasting ≥3 consecutive days, supported by performance decline or subjective fatigue
      - Consistently reduced sleep **below the athlete's typical weekday baseline** for ≥3 nights (e.g., athlete normally sleeps 7h on workdays, now getting 5.5h for several days)
      - Sleep quality issues (high restlessness, low deep sleep %) sustained over multiple nights AND reflected in session quality
      - Weekend sleep significantly below normal (e.g., athlete normally gets 8–9h on Sat/Sun, now getting 6h)
      
      When mentioning sleep, frame feedback constructively:
      - Acknowledge life/work constraints
      - Focus on actionable, realistic habits (e.g., "try to wind down 30 min earlier if possible")
      - Do not imply sleep can be fixed instantly or through willpower alone
    
    reject: |
      - Do not comment on single-day HRV changes under 10% from baseline.
      - Do not treat typical weekday sleep reduction (e.g., 7h Mon–Fri after 9h on weekend) as a problem unless paired with performance issues.
      - Do not flag sleep as "poor" or "short" without comparing to the athlete's normal pattern for that day type (weekday vs weekend).
      - Do not rely solely on HRV from consumer wearables; treat as indicative, not definitive.
      - Avoid drawing strong conclusions from isolated poor sleep nights.
      - Do not give generic "sleep better" advice without clear context or actionable steps tied to real constraints.
      - Ignore minor sleep fluctuations (±30 min from usual) that are within normal daily variation.

  - rule: "Morning HRV readings"
    accept: "Use for context on recovery status for the previous day's training load."
    reject: "Do not use to predict performance for the current day's workout without corroborating data."

  - rule: "Unplanned training sessions"
    accept: "Acknowledge if they provide useful context for overall load or recovery status."
    reject: "Do not analyze in detail or compare to planned sessions; focus only on the scheduled workouts. Low intensity or short duration unplanned sessions should not be commented on."

  - rule: "RPE and subjective fatigue"
    accept: >
     Use as supporting context for performance trends or recovery status when consistent with objective data.
     Athletes use scale from TrainingPeaks with the following guidelines:
      - 1: Very light. Minimal effort.
      - 2: Light. Light effort.
      - 3: Moderate. Conversational pace.
      - 4: Somewhat hard. Challenging yet manageable.
      - 5: Hard. Conversation becomes difficult.
      - 6: Harder. Requires more focus.
      - 7: Very hard. Near limit. Conversation is hard.
      - 8: Extremely hard. Very challenging. Intense focus.
      - 9: Near maximum. Can't maintain for long.
      - 10: Maximum effort. All-out, can't sustain.
    reject: "Do not rely solely on RPE or subjective fatigue reports without objective performance indicators. Avoid overemphasizing subjective feelings if they contradict clear performance data."