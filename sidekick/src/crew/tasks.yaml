workout_analysis_task:
  description: |
    Analyze the workouts recorded on {date} ({weekday}) for athlete {athlete_name}.

    Use the `get_workout_data` tool to retrieve workout analyses and athlete settings.

    If the tool returns no workouts, output exactly:
    "No workout data available for {athlete_name} on {date}."

    Otherwise, for each workout provide:

    1. **Session Overview**: Workout name, sport, duration, distance (if applicable)
    2. **Training Load**: TSS/HRSS, intensity factor — how demanding was this session relative to the athlete's threshold?
    3. **Zone Distribution**: Where was the majority of effort? Was it appropriate for the session type?
    4. **Execution Quality**: Pacing, power consistency, HR response, notable patterns in laps
    5. **Risk Flags**: Any signs of overreaching, unusual HR response, or poor recovery indicators
    6. **Coach Recommendation**: One specific, actionable note for the coach (max 30 words)

    Keep the total report under 500 words. Be factual and direct.

  expected_output: |
    A structured technical performance report in markdown. If no data: a single line stating no data available.

restitution_analysis_task:
  description: |
    Analyze recovery and restitution trends for {athlete_name} from {start_date} to {end_date}
    ({days} days).

    Use the `get_restitution_data` tool to retrieve the daily recovery and training load timeline.

    For each metric, analyze:
    1. **HRV**: baseline level, direction of trend, response after high-TSS days (apply the
       1-day lag — HRV on day N reflects day N-1 training)
    2. **Resting HR**: baseline, rising/falling trend, spikes after load
    3. **Sleep**: hours and quality over time, any progressive decline
    4. **Readiness**: self-reported overall feeling (given sleep duration and quality),
       relative to training days and recovery metrics
    5. **Training load context**: TSS and IF patterns per day, how recovery metrics track them

    If fewer than 5 days have restitution data, note the limitation prominently.
    Focus on multi-day patterns, not individual outliers.

  expected_output: |
    A structured recovery analysis report in English containing:
    1. **Recovery Baseline**: Typical HRV, resting HR, sleep hours, and readiness for this athlete
    2. **Trend Analysis**: Direction and magnitude of key metrics across the period
    3. **Load–Recovery Correlation**: How metrics respond to training stress (TSS/IF) patterns
    4. **Risk Flags**: Any patterns suggesting overreach, chronic fatigue, or inadequate recovery
    5. **Overall Recovery Quality**: Qualitative summary — Good / Adequate / Concerning — with justification
    6. **Coach Recommendations**: 1–2 specific, actionable recovery-focused adjustments

    Be concise. Avoid restating raw numbers when a trend description suffices.

daily_coaching_task:
  description: |
    You are coaching {athlete_name} on {date} ({weekday}).

    Use the `get_plans_data` tool to retrieve today's planned activities and athlete settings.

    You have already received the technical performance analysis as context.
    Combine the analysis with the planned activities to write a concise coaching message.

    Structure your response as:
    1. **Today's Recap** (2-3 sentences): What happened today — execution vs. plan
    2. **Key Takeaway** (1-2 sentences): The single most important observation
    3. **Looking Ahead** (1-2 sentences): One practical suggestion for the next session or recovery

    Write in plain, encouraging English. Maximum 200 words total. Do not repeat raw numbers.

  expected_output: |
    A short coaching message in plain English, structured in three sections as described. Maximum 200 words.
