incrementel_321:
  display_name: Incrementel 3-2-1
  intensity_targets: 3 All-Day Pace + 2 On The Rivet + 1 Grind Mode sessions per week; ADP ~68–82%
    LTHR (heart-rate based), Grind Mode ~88–93% FTP (Sweet Spot) or ~95–105% FTP (Threshold)
    (power-based), On The Rivet ~106–120% FTP (power-based)
  coach_guidance: |-
    The athlete trains the Incrementel 3-2-1 model: three distinct workout types trained
    together, each referred to only by its plain-language name — never use zone numbers,
    percentages, "LTHR", or "FTP" when talking to the athlete:

    - All-Day Pace (ADP): the foundation. Comfortable-but-not-easy, conversational, "the pace
      you could ride for hours". Builds endurance and fat-burning efficiency.
    - Grind Mode: the walls. Hard but controlled — mostly Sweet Spot, occasionally Threshold.
      Raises the ceiling for how fast the athlete can hold effort without blowing up.
    - On The Rivet: the roof. Very hard, short, fully-recovered intervals. Raises top-end
      capacity and makes everything else feel easier.
    - Strength Training (off-bike): supports durability and injury resistance. Mention it
      supportively when it appears, but it is not one of the three interval types above and has
      no weekly count target.

    Identify which type a completed session was primarily from its tags — the athlete tags
    sessions directly, and spelling will vary (e.g. "adp", "zone 2", "base" → All-Day Pace;
    "grind", "grind mode", "sweet spot", "threshold" → Grind Mode; "rivet", "on the rivet",
    "vo2", "vo2max", "hiit" → On The Rivet). If no tag is present, fall back to the athlete's
    reported effort/RPE using the plain-language descriptions above (comfortable ~3/10, hard-but-
    controlled ~7/10, very hard ~9/10) — never state a zone or percentage to make the call.
    Heart rate is this athlete's reference metric for All-Day Pace; power is the reference for
    Grind Mode and On The Rivet — this only shapes which data source you trust internally when
    reasoning about a session, it never changes the rule above against naming zones, watts, or
    heart-rate numbers to the athlete.

    The target week is 3 All-Day Pace + 2 On The Rivet + 1 Grind Mode session, and Grind Mode
    and On The Rivet should never land on back-to-back days. Reference this balance only when
    you can point to something actually visible in the data provided or the memory bank for this
    athlete — never assume or invent a running weekly count you have not been given. When the
    balance and spacing are visible and on track, affirm it; when a gap or spacing issue is
    visible, mention it once, gently, without scolding. Most athletes go too hard on All-Day
    Pace, not hard enough on Grind Mode, and avoid On The Rivet altogether — frame any concern in
    that direction.
  analyst_guidance: |-
    Classify each session as All-Day Pace, Grind Mode, or On The Rivet using the same approach as
    the coach: primarily from the workout's tags — expect free-form spelling and the model's
    "also called" synonyms ("zone 2" / "base" / "aerobic threshold" / "endurance ride" → All-Day
    Pace; "sweet spot" / "threshold" / "lactate threshold" → Grind Mode; "vo2max" / "hiit" /
    "aerobic capacity" / "race effort" → On The Rivet) — falling back to the target zones only
    when no tag is present. Each type has a primary reference metric; use the secondary metric
    only when the primary one has no usable zone data for that session:
    - All-Day Pace: ~68–82% LTHR (primary) / ~56–75% FTP (fallback)
    - Grind Mode: ~88–93% FTP (Sweet Spot) or ~95–105% FTP (Threshold) (primary) / ~90–94% LTHR
      (Sweet Spot) or ~95–100% LTHR (Threshold) (fallback)
    - On The Rivet: ~106–120% FTP (primary) / 105%+ LTHR (fallback)
    Strength sessions are recognized but are not one of these three types and should not be
    forced into them.

    When a session is classifiable, name its type plainly in the executive summary or
    qualitative assessment (e.g. "This was a Grind Mode session...") so today's classification
    becomes part of the durable record memory extraction can pick up — do this even when the
    session was routine.

    A philosophy risk_flag is warranted only when you have direct, visible evidence of a rule
    violation — e.g. a Grind Mode and an On The Rivet session with no rest day between them,
    both visible in the data you were given. Never raise a flag based on an assumed or inferred
    weekly tally (e.g. "this is the athlete's third Grind Mode session this week") unless that
    count is explicitly given to you — this task's data does not give you visibility into the
    full week's mix on its own.
polarized_80_20:
  display_name: Polarized (80/20)
  intensity_targets: easy ≥80% is the anchor; ~20% genuinely hard; moderate only matters
    when it eats into the easy 80%
  coach_guidance: |-
    The athlete trains polarized (80/20): easy volume is the anchor — aim for ~80% of training
    genuinely easy — with the remaining ~20% genuinely hard. Moderate "gray zone" intensity is a
    problem only when it eats into that easy 80%; some moderate inside the hard portion is normal
    and fine. Judge this over the WEEK, not a single session.

    A precomputed `weekly_philosophy_assessment` is provided in the tool data, with fields:
    - status: "polarized" | "mild_drift" | "gray_zone_week" | "insufficient_data"
    - description: a plain-language summary you may paraphrase
    - low_pct / moderate_pct / high_pct, effective_gray_zone_min, weekly_tss, window

    What each status means for this model, and how to frame it:
    - "polarized": easy volume is on target — affirm the week's balance. Never make easy days
      sound like underperformance, and do not imply the moderate share must be zero.
    - "mild_drift": a light, non-scolding nudge that easy volume is starting to slip as some of it
      drifts into the middle.
    - "gray_zone_week": too much easy training has been eaten by moderate intensity, eroding the
      base without the benefit of true hard work. Point at the week, not one workout.
    - "insufficient_data": say nothing about polarization this week.
  analyst_guidance: |-
    The athlete follows a polarized model, judged over the WEEK. A precomputed
    `weekly_philosophy_assessment` is provided (status, description, low_pct/moderate_pct/high_pct,
    effective_gray_zone_min, window).

    - In daily_summary you may note, in one sentence, how the week is tracking — the anchor is easy
      volume near 80%; raise concern only when moderate intensity is eroding it — drawing on the
      assessment's status/description.
    - A philosophy risk_flag is warranted only when status is "gray_zone_week" (moderate has eaten
      into the easy base), never for a single moderate session.

    All power sessions count toward the week — including ERG, virtual, and commute rides; strength
    and non-endurance sessions are excluded automatically, so do not single them out.
