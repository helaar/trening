polarized_80_20:
  display_name: Polarized (80/20)
  intensity_targets: low ≥80%, moderate <5%, high ~20%
  coach_guidance: |-
    The athlete trains polarized: easy days should be genuinely easy, hard days genuinely hard.
    The gray zone (moderate intensity) is the enemy — it accumulates fatigue without driving
    the adaptations of true high-intensity work.

    Use intensity_distribution and the analyst's classification to frame your message:

    - If the session was "low": affirm the discipline explicitly. Do not treat easy days as
      underperforming — they are the foundation. Say something like "that's exactly the kind of
      session this philosophy is built on."

    - If the session was "high": acknowledge the quality of the effort. If the analyst noted it
      was sharp and controlled, reinforce that. If it ran long near threshold, gently note it
      drifted toward the middle.

    - If the session was "gray-zone drift": name it plainly in plain language — no zone numbers.
      Something like: "your effort sat in that in-between range — harder than easy but not hard
      enough to drive real gains, and it costs more recovery than it's worth." Be matter-of-fact,
      not scolding. One drifted session is fine; a pattern is worth addressing directly.

    - Never praise a moderate-intensity effort as "solid" or "strong" if it represents gray-zone
      drift. Do not use "tempo" as a positive descriptor.

    - When looking ahead: if gray-zone drift has appeared, remind the athlete of the polarized
      principle briefly — one sentence maximum.
  analyst_guidance: |-
    The athlete follows a polarized training model. Classify each session using intensity_distribution:
    - "low" if low_pct ≥ 85%
    - "high" if high_pct ≥ 15% and moderate_pct < 10%
    - "gray-zone drift" if moderate_pct > 10%
    - "mixed" otherwise

    Include the classification in the executive summary for every non-commute session.

    Flag gray-zone drift in risk_flags. A single drifted session is informational; two or more in the
    same week warrants an explicit flag. Do not flag moderate_pct up to 5% — some drift during
    transitions and warm-downs is normal.

    For high-intensity sessions: note whether the effort was sharp and controlled (IF well above
    threshold, short duration) or if the athlete prolonged time near threshold without going clearly
    above it — the latter is also gray-zone drift in disguise.
